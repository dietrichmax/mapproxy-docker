[uwsgi]
master = true
chdir = /mapproxy
pyargv = ${MAPPROXY_CONFIG_DATA_PATH}/mapproxy.yaml
wsgi-file = /mapproxy/app.py
pidfile = /tmp/mapproxy.pid
socket = /tmp/mapproxy.sock
chmod-socket = 660
processes = ${UWSGI_PROCESSES}
threads = ${UWSGI_THREADS}

# Proper signal handling: SIGTERM = graceful shutdown (not reload)
die-on-term = true

# Kill worker if a request takes longer than 120 seconds
harakiri = 120

# Recycle workers after N requests to prevent memory leaks
max-requests = 1000

# Buffer size for large WMS request headers
buffer-size = 65535

# Prevent thundering herd on accept()
thunder-lock = true

# Fork then load app per worker (safe with GDAL/GEOS handles)
lazy-apps = true

# Clean up sockets/pidfiles on shutdown
vacuum = true
