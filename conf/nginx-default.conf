upstream mapproxy {
    server unix:/tmp/mapproxy.sock;
}

server {
    listen 8080;

    # DOS mitigation
    keepalive_timeout 10;
    send_timeout 10;

    # Hide server version
    server_tokens off;

    # Gzip compression for text-based responses (not images)
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 4;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/xml
        application/vnd.ogc.wms_xml
        application/vnd.ogc.wmts+xml
        image/svg+xml;

    location / {
        uwsgi_param SCRIPT_NAME $http_script_name;
        uwsgi_pass mapproxy;
        include uwsgi_params;

        proxy_set_header Host $http_host;
        proxy_hide_header X-Powered-By;
        proxy_hide_header Server;

        # Buffer tuning for tile/WMS responses
        uwsgi_buffering on;
        uwsgi_buffer_size 8k;
        uwsgi_buffers 16 8k;

        # Timeouts matching uWSGI harakiri
        uwsgi_read_timeout 120s;
        uwsgi_send_timeout 30s;
    }
}
